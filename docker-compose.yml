version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: splitsmart-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: splitsmart_auth
    ports:
      - "3306:3306"
    networks:
      - splitsmart-network
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
      timeout: 20s
      retries: 10

  zookeeper:
    image: confluentinc/cp-zookeeper:latest
    container_name: splitsmart-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - splitsmart-network

  kafka:
    image: confluentinc/cp-kafka:latest
    container_name: splitsmart-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - splitsmart-network

  service-discovery:
    build:
      context: ./SplitSmartMicroservices/ServiceDiscovery
    container_name: service-discovery
    ports:
      - "8761:8761"
    networks:
      - splitsmart-network

  api-gateway:
    build:
      context: ./SplitSmartMicroservices/ApiGateway
    container_name: api-gateway
    ports:
      - "8080:8080"
    depends_on:
      - service-discovery
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://service-discovery:8761/eureka/
    networks:
      - splitsmart-network

  auth-service:
    build:
      context: ./SplitSmartMicroservices/AuthService
    container_name: auth-service
    ports:
      - "8081:8081"
    depends_on:
      mysql:
        condition: service_healthy
      service-discovery:
        condition: service_started
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/splitsmart_auth?createDatabaseIfNotExist=true
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=root
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://service-discovery:8761/eureka/
    networks:
      - splitsmart-network

  group-service:
    build:
      context: ./SplitSmartMicroservices/GroupService
    container_name: group-service
    ports:
      - "8082:8082"
    depends_on:
      mysql:
        condition: service_healthy
      service-discovery:
        condition: service_started
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/splitsmart_group?createDatabaseIfNotExist=true
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=root
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://service-discovery:8761/eureka/
    networks:
      - splitsmart-network

  approval-service:
    build:
      context: ./SplitSmartMicroservices/ApprovalService
    container_name: approval-service
    ports:
      - "8083:8083"
    depends_on:
      mysql:
        condition: service_healthy
      service-discovery:
        condition: service_started
      kafka:
        condition: service_started
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/splitsmart_approval?createDatabaseIfNotExist=true
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=root
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://service-discovery:8761/eureka/
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
    networks:
      - splitsmart-network

  balance-service:
    build:
      context: ./SplitSmartMicroservices/BalanceService
    container_name: balance-service
    ports:
      - "8084:8084"
    depends_on:
      mysql:
        condition: service_healthy
      service-discovery:
        condition: service_started
      kafka:
        condition: service_started
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/splitsmart_balance?createDatabaseIfNotExist=true
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=root
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://service-discovery:8761/eureka/
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
    networks:
      - splitsmart-network

  expense-service:
    build:
      context: ./SplitSmartMicroservices/ExpenseService
    container_name: expense-service
    ports:
      - "8085:8085"
    depends_on:
      mysql:
        condition: service_healthy
      service-discovery:
        condition: service_started
      kafka:
        condition: service_started
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/splitsmart_expense?createDatabaseIfNotExist=true
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=root
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://service-discovery:8761/eureka/
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
    networks:
      - splitsmart-network

  fraud-detection-service:
    build:
      context: ./SplitSmartMicroservices/FraudDetectionService
    container_name: fraud-detection-service
    ports:
      - "8086:8086"
    depends_on:
      mysql:
        condition: service_healthy
      service-discovery:
        condition: service_started
      kafka:
        condition: service_started
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/splitsmart_fraud?createDatabaseIfNotExist=true
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=root
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://service-discovery:8761/eureka/
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - GOOGLE_GENAI_API_KEY=${GOOGLE_GENAI_API_KEY}
    networks:
      - splitsmart-network

  notification-service:
    build:
      context: ./SplitSmartMicroservices/NotificationService
    container_name: notification-service
    ports:
      - "8087:8087"
    depends_on:
      mysql:
        condition: service_healthy
      service-discovery:
        condition: service_started
      kafka:
        condition: service_started
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/splitsmart_notification?createDatabaseIfNotExist=true
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=root
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://service-discovery:8761/eureka/
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
    networks:
      - splitsmart-network

networks:
  splitsmart-network:
    driver: bridge
