spring.application.name=fraud-detection-service
server.port=8086

# Eureka Client Configuration
eureka.client.serviceUrl.defaultZone=http://localhost:8761/eureka/

# MySQL DataSource Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/splitsmart_fraud
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
# Spring AI Google GenAI Configuration
spring.ai.google.genai.api-key=AIzaSyDUXf6Q3FjZTgrmcL95G5_yPcVvaVkIx1c
spring.ai.google.genai.chat.options.model=gemini-1.5-flash
# Kafka Configuration
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer
